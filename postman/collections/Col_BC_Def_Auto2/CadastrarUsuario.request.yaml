$kind: http-request
name: CadastrarUsuario
url: https://serverest.dev/usuarios
method: POST
headers:
  accept: application/json
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "nome": "Teste {{$randomFullName}}",
      "email": "teste_{{$timestamp}}@qa.com.br",
      "password": "teste",
      "administrador": "true"
    }
