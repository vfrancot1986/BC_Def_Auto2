    code: "pm.test(\"Status Request\", function () {\r

      \    pm.expect(pm.response.code).to.be.oneOf([201]);\r

      });\r

      var jsonData = JSON.parse(pm.response.text());\r

      pm.environment.set(\"newId\", jsonData._id);\r\n"
    language: text/javascript
